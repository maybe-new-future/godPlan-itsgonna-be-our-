services:
  - type: web
    name: tifawin-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm ci && npm run build:prod
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: tifawin-uploads
      mountPath: /var/data
      sizeGB: 1
